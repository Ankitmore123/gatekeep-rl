name: Continuous Integration - Rate Limiter Concurrency Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # 🔄 Spin up Redis in the cloud just like your docker-compose setup
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Testing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest redis

    - name: Execute Race Condition Concurrency Suite
      run: |
        pytest tests/test_concurrency.py -v -s